name: Weekly Timetable Probe

# Runs every Monday at 08:00 UTC — early enough to catch boards publishing
# timetables at start-of-week. Also triggerable manually via Actions UI.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      force_parse:
        description: 'Force re-parse even if already cached (true/false)'
        default: 'false'

jobs:
  probe:
    name: Probe exam board PDFs for new seasons
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ─────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Probe script ────────────────────────────────────────────────────────
      - name: Run timetable probe
        id: probe
        run: node .github/scripts/probe-timetables.mjs
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FORCE_PARSE:               ${{ inputs.force_parse || 'false' }}

      # ── Notify on new timetables ────────────────────────────────────────────
      - name: Create GitHub issue if new timetables found
        if: steps.probe.outputs.new_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const summary = process.env.NEW_SUMMARY;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `📅 New exam timetable(s) detected — ${new Date().toISOString().slice(0,10)}`,
              body: [
                '## New timetable PDFs found',
                '',
                summary,
                '',
                '### What to do',
                '1. Verify the URLs are correct by opening them in a browser.',
                '2. The probe has already triggered parsing and caching in Supabase.',
                '3. Update `public/data/timetable-sources.json` with the new season entries.',
                '4. If the season is genuinely new (e.g. 2027-mj), also update `ACTIVE_SEASON`',
                '   in `src/utils/timetable.js`.',
                '',
                '_This issue was created automatically by the weekly timetable probe._',
              ].join('\n'),
              labels: ['timetable-update', 'automated'],
            });
        env:
          NEW_SUMMARY: ${{ steps.probe.outputs.new_summary }}
